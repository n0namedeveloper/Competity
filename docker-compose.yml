services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: competity
      POSTGRES_PASSWORD: competity
      POSTGRES_DB: competity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Competity API ──
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://competity:competity@db:5432/competity
    volumes:
      - ./app:/app/app  # Hot-reload in development

  # ── n8n (Workflow Automation) ──
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=competity
      - WEBHOOK_URL=http://n8n:5678/
    volumes:
      - n8ndata:/home/node/.n8n

  # ── Premium Frontend Dashboard ──
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata:
  n8ndata:
